<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Prep — LeetCode Tracker</title>
<meta name="description" content="Curated LeetCode problem checklist with per-problem notes for technical interview prep. Tracks 13 problems across arrays, strings, trees, graphs, and DP.">
<meta name="author" content="Mahalakshumi Visvanathan">
<link rel="canonical" href="https://mahav.io/leetcode">
<meta property="og:title" content="LeetCode Tracker — Interview Prep Checklist">
<meta property="og:description" content="Track progress through a curated LeetCode study list with per-problem notes. Built for LinkedIn-style SWE technical interview prep.">
<meta property="og:url" content="https://mahav.io/leetcode">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Programming Artifacts">
<meta name="twitter:card" content="summary">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0efe8;
    --muted: #6b6a72;
    --accent: #c8f764;
    --accent-dim: rgba(200,247,100,0.12);
    --medium: #f0b429;
    --hard: #e05252;
    --done-text: #3a3a42;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 3rem 1.5rem 6rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 3rem;
    animation: fadeUp 0.6s ease both;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 11px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    margin-bottom: 1.5rem;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .back-link:hover {
    color: var(--text);
    border-color: var(--text);
    background: var(--surface);
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 0.5rem;
  }

  h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-top: 0.75rem;
  }

  .stats-row {
    display: flex;
    gap: 1.5rem;
    margin: 2rem 0 1.25rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .stat-num.accent { color: var(--accent); }
  .stat-num.medium-col { color: var(--medium); }

  .progress-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 99px;
    margin-bottom: 2.5rem;
    overflow: hidden;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .section {
    margin-bottom: 0.25rem;
    animation: fadeUp 0.6s ease both;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.6rem 0;
    margin-bottom: 0.25rem;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .problem-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 16px;
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 4px;
    user-select: none;
  }

  .problem-row:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .problem-row.completed {
    background: transparent;
  }

  .problem-row.completed:hover {
    background: var(--surface);
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    background: transparent;
  }

  .checkbox svg {
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .completed .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .completed .checkbox svg {
    opacity: 1;
    transform: scale(1);
  }

  .problem-info { flex: 1; min-width: 0; }

  .problem-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    transition: color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .completed .problem-name {
    color: var(--done-text);
    text-decoration: line-through;
    text-decoration-color: var(--done-text);
  }

  .problem-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .completed .problem-num { color: #2e2e36; }

  .diff-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 99px;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .diff-medium { background: rgba(240,180,41,0.12); color: var(--medium); }
  .diff-hard   { background: rgba(224,82,82,0.12);  color: var(--hard);   }

  .lc-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .lc-btn:hover {
    color: var(--text);
    border-color: var(--border2);
    background: var(--surface2);
  }

  .completed .lc-btn {
    color: #2e2e36;
    border-color: #1e1e24;
  }

  .completed .lc-btn:hover {
    color: var(--muted);
    border-color: var(--border);
  }

  .note-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .note-btn:hover {
    color: var(--text);
    border-color: var(--border2);
    background: var(--surface2);
  }

  .note-btn.has-note {
    color: var(--accent);
    border-color: rgba(200,247,100,0.25);
  }

  .completed .note-btn {
    color: #2e2e36;
    border-color: #1e1e24;
  }

  .completed .note-btn.has-note {
    color: rgba(200,247,100,0.4);
    border-color: rgba(200,247,100,0.15);
  }

  .completed .note-btn:hover {
    color: var(--muted);
    border-color: var(--border);
  }

  .note-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.22s ease;
  }

  .note-panel.open {
    max-height: 260px;
  }

  .note-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 10px 12px;
    resize: vertical;
    min-height: 90px;
    max-height: 220px;
    margin: 6px 0 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .note-input:focus { border-color: var(--border2); }
  .note-input::placeholder { color: var(--muted); opacity: 0.55; }

  footer {
    margin-top: 3.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeUp 0.6s ease both;
  }

  .congrats {
    display: none;
    text-align: center;
    padding: 2rem 0 1rem;
    animation: fadeUp 0.4s ease both;
  }

  .congrats-emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .congrats-text { font-size: 18px; font-weight: 700; color: var(--accent); }
  .congrats-sub { font-size: 13px; color: var(--muted); margin-top: 0.25rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section:nth-child(1) { animation-delay: 0.08s; }
  .section:nth-child(2) { animation-delay: 0.14s; }
  .section:nth-child(3) { animation-delay: 0.18s; }
  .section:nth-child(4) { animation-delay: 0.22s; }
  .section:nth-child(5) { animation-delay: 0.26s; }
  .section:nth-child(6) { animation-delay: 0.30s; }
  .section:nth-child(7) { animation-delay: 0.34s; }
  .section:nth-child(8) { animation-delay: 0.38s; }

  @media (max-width: 480px) {
    .diff-badge { display: none; }
    .problem-name { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="container">

  <a class="back-link" href="/">← programming artifacts</a>
  <header>
    <div class="eyebrow">LinkedIn SWE — Technical round</div>
    <h1>12-problem<br><em>primer.</em></h1>
    <p class="subtitle">One focused weekend. Maximum concept coverage.</p>
  </header>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-num accent" id="done-count">0</div>
      <div class="stat-label">Solved</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="remaining-count">13</div>
      <div class="stat-label">Remaining</div>
    </div>
    <div class="stat">
      <div class="stat-num medium-col" id="pct">0%</div>
      <div class="stat-label">Complete</div>
    </div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div id="congrats" class="congrats">
    <div class="congrats-emoji">🎯</div>
    <div class="congrats-text">All done. Go get that job.</div>
    <div class="congrats-sub">LinkedIn doesn't know what's coming.</div>
  </div>

  <div id="problem-list"></div>

  <footer>
    <span>Click a row to toggle completion</span>
    <span id="footer-date"></span>
  </footer>
</div>

<script>
const problems = [
  { topic: "Arrays & two pointers", items: [
    { id: 1,  name: "Container with most water",           diff: "medium", lc: 11  },
    { id: 2,  name: "Trapping rain water",                 diff: "hard",   lc: 42  },
  ]},
  { topic: "Strings & sliding window", items: [
    { id: 3,  name: "Longest substring without repeating", diff: "medium", lc: 3   },
    { id: 4,  name: "Minimum window substring",            diff: "hard",   lc: 76  },
  ]},
  { topic: "Linked list", items: [
    { id: 5,  name: "Reverse linked list",                 diff: "medium", lc: 206 },
    { id: 6,  name: "Merge k sorted lists",                diff: "hard",   lc: 23  },
  ]},
  { topic: "Binary tree", items: [
    { id: 7,  name: "Binary tree level order traversal",   diff: "medium", lc: 102 },
    { id: 8,  name: "Binary tree maximum path sum",        diff: "hard",   lc: 124 },
  ]},
  { topic: "Heap", items: [
    { id: 9,  name: "Kth largest element in an array",    diff: "medium", lc: 215 },
  ]},
  { topic: "Graphs", items: [
    { id: 10, name: "Number of islands",                   diff: "medium", lc: 200 },
    { id: 11, name: "Course schedule",                     diff: "medium", lc: 207 },
  ]},
  { topic: "Binary search", items: [
    { id: 12, name: "Search in rotated sorted array",      diff: "medium", lc: 33  },
  ]},
  { topic: "Dynamic programming", items: [
    { id: 13, name: "Coin change",                         diff: "medium", lc: 322 },
  ]},
];

const STORAGE_KEY = 'lc_tracker_done';
const NOTES_KEY = 'lc_tracker_notes';
let done = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let notes = JSON.parse(localStorage.getItem(NOTES_KEY) || '{}');

const total = problems.reduce((s, g) => s + g.items.length, 0);

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...done]));
}

function saveNotes() {
  localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
}

function updateStats() {
  const n = done.size;
  document.getElementById('done-count').textContent = n;
  document.getElementById('remaining-count').textContent = total - n;
  const pct = Math.round((n / total) * 100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('congrats').style.display = n === total ? 'block' : 'none';
}

function render() {
  const list = document.getElementById('problem-list');
  list.innerHTML = '';

  problems.forEach(group => {
    const sec = document.createElement('div');
    sec.className = 'section';

    sec.innerHTML = `
      <div class="section-header">
        <span class="section-label">${group.topic}</span>
        <div class="section-line"></div>
      </div>
    `;

    group.items.forEach(p => {
      const entry = document.createElement('div');
      entry.className = 'problem-entry';

      const hasNote = !!(notes[p.id] && notes[p.id].length);
      const row = document.createElement('div');
      row.className = 'problem-row' + (done.has(p.id) ? ' completed' : '');
      row.innerHTML = `
        <div class="checkbox">
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4L4 7.5L10 1" stroke="#0e0e10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="problem-info">
          <div class="problem-name">${p.name}</div>
          <div class="problem-num">LC #${p.lc}</div>
        </div>
        <span class="diff-badge diff-${p.diff}">${p.diff}</span>
        <button class="note-btn${hasNote ? ' has-note' : ''}" type="button">note</button>
        <a class="lc-btn" href="https://leetcode.com/problems/${slugs[p.lc]}" target="_blank" onclick="event.stopPropagation()">open ↗</a>
      `;
      row.addEventListener('click', () => {
        if (done.has(p.id)) done.delete(p.id);
        else done.add(p.id);
        save();
        row.classList.toggle('completed');
        updateStats();
      });

      const panel = document.createElement('div');
      panel.className = 'note-panel';
      const textarea = document.createElement('textarea');
      textarea.className = 'note-input';
      textarea.placeholder = 'notes — approach, edge cases, complexity...';
      textarea.value = notes[p.id] || '';
      textarea.addEventListener('click', (e) => e.stopPropagation());
      textarea.addEventListener('input', () => {
        const val = textarea.value;
        if (val) notes[p.id] = val;
        else delete notes[p.id];
        saveNotes();
        row.querySelector('.note-btn').classList.toggle('has-note', !!val);
      });
      panel.appendChild(textarea);

      row.querySelector('.note-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        panel.classList.toggle('open');
        if (panel.classList.contains('open')) textarea.focus();
      });

      entry.appendChild(row);
      entry.appendChild(panel);
      sec.appendChild(entry);
    });

    list.appendChild(sec);
  });
}

const slugs = {
  11: 'container-with-most-water',
  42: 'trapping-rain-water',
  3:  'longest-substring-without-repeating-characters',
  76: 'minimum-window-substring',
  206:'reverse-linked-list',
  23: 'merge-k-sorted-lists',
  102:'binary-tree-level-order-traversal',
  124:'binary-tree-maximum-path-sum',
  215:'kth-largest-element-in-an-array',
  200:'number-of-islands',
  207:'course-schedule',
  33: 'search-in-rotated-sorted-array',
  322:'coin-change',
};

const d = new Date();
document.getElementById('footer-date').textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

render();
updateStats();
</script>
</body>
</html>
